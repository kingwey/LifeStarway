version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifestarway
      POSTGRES_USER: lifestarway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifestarway_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestarway"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://lifestarway:${POSTGRES_PASSWORD:-lifestarway_dev}@db:5432/lifestarway
      REDIS_URL: redis://redis:6379/0
      PORT: ${PORT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f'http://0.0.0.0:{os.getenv(\"PORT\",8000)}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
    depends_on:
      - backend
